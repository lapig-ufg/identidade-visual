<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 138" width="120" height="138">
  <!-- Hexágono — moldura para foto, ícone de título ou recorte de imagem -->
  <!-- NÃO usar como background. Para ícone do globo, usar lapig-icone.svg -->
  <polygon points="60,3 114,33 114,105 60,135 6,105 6,33"
    fill="none" stroke="#429B4D" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Guia de recorte interno (clip-path reference) -->
  <polygon points="60,8 110,36 110,102 60,130 10,102 10,36"
    fill="none" stroke="#429B4D" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,3"/>
</svg>