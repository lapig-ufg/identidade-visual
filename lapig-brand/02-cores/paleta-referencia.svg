  <rect x="480" y="175" width="56" height="42" rx="6" fill="#D0D0CC"/>
  <text x="480" y="233" class="hex">#D0D0CC</text>
  <rect x="546" y="175" width="56" height="42" rx="6" fill="#ECECEA"/>
