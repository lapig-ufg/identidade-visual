  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1B3A2A"/><stop offset="100%" stop-color="#429B4D"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2A9D8F"/><stop offset="100%" stop-color="#429B4D"/></linearGradient>
